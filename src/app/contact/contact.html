<div class="contact">

  <!-- TITEL -->
  <div class="title">
    <h2>Say hi!</h2>
  </div>

  <!-- TEXT -->
  <div class="text">

    <p class="green-text">
      Want to discuss a new project?
    </p>

    <p class="description">
      Say hello! Let's discuss your ideas and make it happen.
    </p>

  </div>

  <!-- FORMULAR -->
  <form class="contact-form">

    <input
      type="text"
      name="name"
      placeholder="Your name"
      required
    >

    <input
      type="email"
      name="email"
      placeholder="Your email"
      required
    >

    <textarea
      name="message"
      placeholder="Your message"
      rows="5"
      required
    ></textarea>

    <!-- DATENSCHUTZ -->
    <div class="privacy">

      <input
        type="checkbox"
        id="privacy-policy"
        required
      >

      <label for="privacy-policy">
        I've read the
        <a href="#">privacy policy</a>
        and agree to the processing of my data as outlined.
      </label>

    </div>

    <!-- BUTTON -->
    <button type="submit">
      Send message
    </button>

  </form>

  <!-- PFEIL NACH OBEN -->
  <div class="top-right">
    <img src="assets/arrows/arrow_top.png" alt="Arrow Up">
  </div>

</div>
