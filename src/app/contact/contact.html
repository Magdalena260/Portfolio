<div class="contact">

  <img class="background-shape" src="assets/arrows/rectangle.svg" alt="">

  <div class="contact-inner">

    <!-- LEFT -->
    <div class="left">
      <h2>Say hi!</h2>
    </div>

    <!-- RIGHT -->
    <div class="right">

      <div class="text">
        <p class="green-text">Want to discuss a new project?</p>
        <p class="description">
          Say hello! Let's discuss your ideas and make it happen.
        </p>
      </div>

      <form class="contact-form">

        <input type="text" placeholder="Your name">
        <input type="email" placeholder="Your email">

        <!-- MESSAGE -->
        <div class="message-box">
          <textarea placeholder="Your message"></textarea>
          <img class="message-icon" src="assets/arrows/group.svg" alt="">
        </div>

        <!-- PRIVACY -->
        <div class="privacy">
          <input type="checkbox" id="privacy">
          <label for="privacy">
            I've read the <a href="#">privacy policy</a> and agree to the processing of my data as outlined.
          </label>
        </div>

        <button>Send message</button>

      </form>

    </div>

  </div>

  <div class="top-right">
    <img src="assets/arrows/arrow_top.svg" alt="">
  </div>

</div>
